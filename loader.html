<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petcaria® · Cuidado integral para todos los seres vivos</title>
<meta name="description" content="Estamos preparando una nueva casa digital para el cuidado integral de todos los seres vivos.">
<link rel="icon" href="favicon.png" type="image/x-icon">
<style>
  :root{
    --azul: #014f67;
    --teal: #089b95;
    --menta: #37cfb1;
    --blanco: #FFFFFF;
    --gris-fondo: #F4F8F9;
    --negro-texto: #1A262A;
    --gris-borde: #E0EAEB;
    --coral: #F4A261;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  @font-face{
    font-family:'More Sugar';
    src: local('More Sugar');
    font-display: swap;
  }

  html,body{
    height:100%;
    background: var(--blanco);
    background-image:
      radial-gradient(circle at 18% 15%, rgba(55,207,177,0.10), transparent 45%),
      radial-gradient(circle at 85% 85%, rgba(8,155,149,0.08), transparent 50%);
    color: var(--negro-texto);
    font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    overflow-x:hidden;
  }

  .wrap{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding: 32px 20px;
  }

  .eyebrow{
    font-size:13px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color: var(--teal);
    font-weight:700;
    margin-bottom: 28px;
    opacity:0;
    animation: fade-up .7s ease forwards;
    animation-delay:.1s;
  }

  /* ---- Firma: ECG que late y se transforma en huella ---- */
  .signature{
    width: min(560px, 86vw);
    height: 180px;
    margin-bottom: 8px;
    opacity:0;
    animation: fade-up .8s ease forwards;
    animation-delay:.25s;
  }

  .ecg-line{
    fill:none;
    stroke: var(--teal);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: drop-shadow(0 0 6px rgba(8,155,149,.25));
    stroke-dasharray: 600;
    stroke-dashoffset: 600;
    animation: draw-ecg 2.6s ease-in-out infinite;
  }

  .paw-pulse{
    fill: var(--azul);
    opacity:0;
    transform-origin: 280px 92px;
    animation: paw-beat 2.6s ease-in-out infinite;
  }

  @keyframes draw-ecg{
    0%{ stroke-dashoffset: 600; opacity:1; }
    55%{ stroke-dashoffset: 0; opacity:1; }
    62%{ opacity:0; }
    100%{ opacity:0; stroke-dashoffset:0; }
  }

  @keyframes paw-beat{
    0%, 50%{ opacity:0; transform: scale(.4); }
    58%{ opacity:1; transform: scale(1.12); }
    66%{ opacity:1; transform: scale(1); }
    85%{ opacity:1; }
    96%, 100%{ opacity:0; transform: scale(.9); }
  }

  h1{
    font-family:'More Sugar','Brush Script MT', cursive;
    font-weight:400;
    font-size: clamp(40px, 8vw, 64px);
    letter-spacing: .01em;
    color: var(--azul);
    opacity:0;
    animation: fade-up .8s ease forwards;
    animation-delay:.4s;
  }

  .tagline{
    margin-top: 16px;
    max-width: 480px;
    font-size: 17px;
    line-height: 1.6;
    color: var(--negro-texto);
    opacity:0;
    animation: fade-up .8s ease forwards;
    animation-delay:.55s;
  }

  .tagline strong{
    color: var(--teal);
    font-weight:600;
  }

  .status-pill{
    margin-top: 32px;
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding: 9px 18px;
    border-radius: 999px;
    background: var(--gris-fondo);
    border: 1px solid var(--gris-borde);
    font-size: 13px;
    color: var(--azul);
    opacity:0;
    animation: fade-up .8s ease forwards;
    animation-delay:.7s;
  }

  .status-dot{
    width:8px; height:8px;
    border-radius:50%;
    background: var(--teal);
    box-shadow: 0 0 0 0 rgba(8,155,149,.6);
    animation: dot-ping 1.8s ease-out infinite;
  }

  @keyframes dot-ping{
    0%{ box-shadow: 0 0 0 0 rgba(8,155,149,.45); }
    70%{ box-shadow: 0 0 0 8px rgba(8,155,149,0); }
    100%{ box-shadow: 0 0 0 0 rgba(8,155,149,0); }
  }

  footer{
    margin-top: 56px;
    font-size: 13px;
    color: rgba(26,38,42,0.55);
    opacity:0;
    animation: fade-up .8s ease forwards;
    animation-delay:.85s;
  }

  footer a{
    color: var(--teal);
    text-decoration: none;
    border-bottom: 1px solid rgba(8,155,149,0.4);
  }
  footer a:hover{ color: var(--azul); border-color: var(--azul); }

  @keyframes fade-up{
    from{ opacity:0; transform: translateY(10px); }
    to{ opacity:1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.01ms !important; animation-iteration-count:1 !important; }
    .ecg-line{ stroke-dashoffset:0; opacity:1; }
    .paw-pulse{ opacity:1; transform:scale(1); }
  }

  :focus-visible{ outline:2px solid var(--menta); outline-offset:3px; }
</style>
</head>
<body>

<div class="wrap">
  <p class="eyebrow">En remodelación</p>

  <svg class="signature" viewBox="0 0 560 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Línea de electrocardiograma que se transforma en huella, símbolo de cuidado médico y cercanía animal">
    <path class="ecg-line" d="M0,92 L70,92 L95,40 L120,140 L150,30 L175,92 L230,92 C 240,92 245,70 255,82 C 263,91 268,100 280,92 C 292,84 297,75 305,82 C 313,89 318,100 330,92 L385,92 L560,92" />
    <g class="paw-pulse">
      <ellipse cx="280" cy="98" rx="13" ry="11"/>
      <ellipse cx="260" cy="80" rx="6" ry="7"/>
      <ellipse cx="273" cy="68" rx="6" ry="7"/>
      <ellipse cx="288" cy="68" rx="6" ry="7"/>
      <ellipse cx="300" cy="80" rx="6" ry="7"/>
    </g>
  </svg>

  <h1>Petcaria</h1>

  <p class="tagline">
    Estamos ampliando nuestra casa digital: de
    <strong>cuidado integral para todas las especies</strong>.
    Confianza, salud y calidez — vuelve pronto.
  </p>

  <div class="status-pill">
    <span class="status-dot"></span>
    Construyendo la nueva experiencia
  </div>

  <footer>
    Petcaria® · <a href="https://evamtz.me" target="_blank" rel="noopener noreferrer">evamtz.me</a>
  </footer>
</div>

</body>
</html>
